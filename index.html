          }
        });
        actions.appendChild(confirm);
      }
      card.appendChild(actions);
      bubble.appendChild(card);
      article.appendChild(bubble);
      proposalInline = article;
      messages.appendChild(article);
      typesetMath(article);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeInlineProposal() {
      if (proposalInline && proposalInline.parentNode) {
        proposalInline.remove();
      }
      proposalInline = null;
    }

    function setProposal(proposal, options = {}) {
      if (options.record !== false) {
        activeSession().proposal = proposal;
        persistSessions();
      }
      renderProposal(proposal);
    }

    function clearProposal(options = {}) {
      if (options.record !== false) {
        activeSession().proposal = null;
        persistSessions();
      }
      renderProposal(null);
    }

    function renderActiveSession() {
      clearThinkingIndicator();
      messages.replaceChildren();
      const session = activeSession();
      renderDocumentContext();
      session.messages.forEach((message) => renderMessage(normalizeMessage(message)));
      renderProposal(session.proposal);
      if (isBusy) {
        showThinkingIndicator();
      }
    }

    function sessionShortLabel(title) {
      const words = String(title || "")
        .trim()
        .split(/\s+/)
        .filter(Boolean);
      if (!words.length) {
        return "AI";
      }
      const initials = words
        .slice(0, 2)
        .map((word) => word[0])
        .join("")
        .toUpperCase();
      return initials || "AI";
    }

    function deleteSession(sessionId) {
      if (isBusy) {
        return;
      }
      const index = sessions.findIndex((session) => session.id === sessionId);
      if (index < 0) {
        return;
      }

      const deletedActive = sessionId === activeSessionId;
      sessions.splice(index, 1);
      sessionDocuments.delete(sessionId);
      if (!sessions.length) {
        sessions = [createSession(modeTitle(chatMode), chatMode)];
      }
      if (deletedActive || !sessions.some((session) => session.id === activeSessionId)) {
        activeSessionId = sessions[Math.min(index, sessions.length - 1)].id;
        chatMode = normalizeChatMode(activeSession().mode || "bricscad");
        renderModeSelection();
        renderActiveSession();
        syncActiveSessionToQt();
      }

      persistSessions();
      renderSessionList();
      input.focus();
    }

    function renderSessionList() {
      const query = chatSearch.value.trim().toLowerCase();
      chatList.replaceChildren();
      sessions.forEach((session) => {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.classList.toggle("hidden", query.length > 0 && !session.title.toLowerCase().includes(query));

        const link = document.createElement("button");
        link.type = "button";
        link.className = "chat-link";
        link.classList.toggle("active", session.id === activeSessionId);
        link.dataset.sessionId = session.id;
        link.title = session.title;

        const shortLabel = document.createElement("span");
        shortLabel.className = "chat-short";
        shortLabel.textContent = sessionShortLabel(session.title);

        const title = document.createElement("span");
        title.className = "chat-title";
        title.textContent = session.title;

        link.appendChild(shortLabel);
        link.appendChild(title);
        link.addEventListener("click", (event) => {
          event.preventDefault();
          switchSession(session.id);
        });

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "chat-delete";
        deleteButton.textContent = "X";
        deleteButton.setAttribute("aria-label", `Sitzung ${session.title} löschen`);
        deleteButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          deleteSession(session.id);
        });

        item.appendChild(link);
        item.appendChild(deleteButton);
        chatList.appendChild(item);
      });
    }

    function switchSession(sessionId) {
      if (isBusy || sessionId === activeSessionId) {
        return;
      }
      if (!sessions.some((session) => session.id === sessionId)) {
        return;
      }
      activeSessionId = sessionId;
      chatMode = normalizeChatMode(sessions.find((session) => session.id === sessionId)?.mode || "bricscad");
      renderModeSelection();
      persistSessions();
      renderSessionList();
      renderActiveSession();
      syncActiveSessionToQt();
      input.focus();
    }

    function submitPrompt() {
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }
      if (!bridge) {
        addMessage({ speaker: "Barebone-Qt", message: "Qt WebChannel ist noch nicht verbunden.", time: nowTime() });
        return;
      }
      if (documentsLoading > 0) {
        addMessage({ speaker: "Barebone-Qt", message: "Dateien werden noch gelesen. Bitte sende die Anfrage gleich erneut.", time: nowTime() }, { record: false });
        return;
      }
      const documentPromptContext = buildDocumentContextForPrompt(text);
      input.value = "";
      if (documentPromptContext.hasDocuments && typeof bridge.sendPromptWithContext === "function") {
        bridge.sendPromptWithContext(text, documentPromptContext);
      } else {
        bridge.sendPrompt(text);
      }
      requestAnimationFrame(() => input.focus());
    }

    function requestNewChat() {
      if (isBusy) {
        return;
      }
      const session = createSession(`Neue Sitzung ${++chatCounter}`, chatMode);
      sessions.unshift(session);
      activeSessionId = session.id;
      persistSessions();
      renderSessionList();
      renderActiveSession();
      syncActiveSessionToQt();
      input.focus();
    }

    function filterChats() {
      renderSessionList();
    }

      toolsMenu.classList.toggle("open");
    }

    function closeToolsMenu() {
      toolsMenu.classList.remove("open");
    }

    function stripLogTimestamp(line) {
      return String(line || "").replace(/^\[[^\]]+\]\s*/, "").trim();
    }

    function compactLogText(text, maxLength = 140) {
      const compact = String(text || "")
        .replace(/\s+/g, " ")
        .replace(/result=\{.*$/i, "abgeschlossen")
        .trim();
      if (compact.length <= maxLength) {
        return compact;
      }
      return `${compact.slice(0, Math.max(0, maxLength - 1)).trim()}…`;
    }

    function routeDisplayName(route) {
      const names = {
        "general_chat": "allgemeine Antwort",
        "document_qa": "Dokumentauswertung",
        "bricscad_question": "BricsCAD-Frage",
        "bricscad_action": "BricsCAD-Aktion",
        "execution_summary": "Abschlusszusammenfassung",
        "validation_retry": "Korrekturrunde"
      };
      return names[route] || route || "Anfrage";
    }

    function compactAiRetryReason(reason) {
      let value = String(reason || "").trim();
      value = value
        .replace(/^BRX-Ausfuehrung fehlgeschlagen,\s*korrigiere Vorschlag:\s*/i, "BRX-Rückmeldung wird berücksichtigt: ")
        .replace(/^action_proposal ist nicht gueltig:\s*/i, "Aktionsvorschlag wird korrigiert: ")
        .replace(/^Antwort ist kein gueltiges Barebone-Agent-JSON\.\s*/i, "Antwortformat wird korrigiert. ")
        .replace(/^Die Trainingsantwort konnte nicht als JSON gelesen werden\.\s*/i, "Workflow-JSON wird repariert. ")
        .replace(/^Die AI hat im Trainingsmodus keine finale JSON-Antwort geliefert\.\s*/i, "Workflow-Antwort wird kompakter angefordert. ");
      return compactLogText(value, 115);
    }

    function updateAiThinkingDetail(text, key = "ai-progress") {
      addThinkingDetail(text, { key });
    }

    function aiRequestLabel(label) {
      const value = String(label || "");
      if (value.startsWith("agent_loop_")) {
        return "Ich denke erneut nach und korrigiere die Antwort.";
      }
      if (value.startsWith("tool_error_loop_")) {
        return "Ich denke erneut nach und korrigiere den Vorschlag nach der BRX-Rückmeldung.";
      }
      if (value === "tool_result") {
        return "Ich werte die BRX-Rückmeldung aus.";
      }
      if (value === "context_result" || value === "prompt+context") {
        return "Ich werte den Zeichnungskontext aus.";
      }
      if (value === "execution_summary") {
        return "Ich erstelle eine kurze Abschlusszusammenfassung.";
      }
      return "Ich werte die Anfrage mit dem vorbereiteten Kontext aus.";
    }

    function addAiThinkingDetailFromLog(line) {
      const text = stripLogTimestamp(line);
      let match = text.match(/^Qt -> AI Router: .*mode=([^\s]+).*model=([^\s]+).*timeoutMs=(\d+)/);
      if (match) {
        updateAiThinkingDetail("Ich ordne die Anfrage ein und wähle den passenden Antwortweg.");
        return true;
      }

      match = text.match(/^AI Envelope: mode=([^\s]+) route=([^\s]+) profile=([^\s]+) toolsSent=([^\s]+) policyRefs=(.*)$/);
      if (match) {
        const tools = match[4] && match[4] !== "-"
          ? match[4].split(",").filter(Boolean).length
          : 0;
        const toolText = tools > 0 ? ` mit ${tools} passenden Tool${tools === 1 ? "" : "s"}` : " ohne Toolfreigabe";
        updateAiThinkingDetail(`Ich bereite den Kontext vor: ${routeDisplayName(match[2])}${toolText}.`);
        return true;
      }

      match = text.match(/^Qt -> AI Agent: ([^\s]+) provider=.*model=([^\s]+).*timeoutMs=(\d+)(?:\s+maxTokens=(\d+)\s+context=(\d+))?/);
      if (match) {
        aiThinkingState.requests += 1;
        const label = match[1];
        const isInitialPrompt = label.startsWith("prompt/");
        if (isInitialPrompt && aiThinkingState.requests === 1) {
          return true;
        }
        updateAiThinkingDetail(aiRequestLabel(label));
        return true;
      }

      match = text.match(/^Qt -> AI Workflow Training: .*compact=(true|false).*timeoutMs=(\d+)(?:\s+maxTokens=(\d+)\s+context=(\d+))?/);
      if (match) {
        aiThinkingState.requests += 1;
        const compact = match[1] === "true";
        const isRepeatedAiRequest = aiThinkingState.requests > 1
          || aiThinkingState.workflowRetries > 0
          || aiThinkingState.retries > 0;
        if (!isRepeatedAiRequest) {
          return true;
        }
        updateAiThinkingDetail(compact
          ? "Ich fordere eine kompakte Workflow-Antwort an."
          : "Ich sende den Workflow-Entwurf erneut an die AI.",
          "workflow-ai-request");
        return true;
      }

      if (text.includes("Workflow Training Review: Vor dem Speichern")) {
        updateAiThinkingDetail("Ich prüfe den Workflow vor dem Speichern punktweise.", "workflow-review");
        return true;
      }

      if (text.includes("Workflow Training Review: Nutzerantwort wird zur Ueberarbeitung")) {
        updateAiThinkingDetail("Ich überarbeite den Workflow anhand der Review-Antwort.", "workflow-review");
        return true;
      }

      if (text.includes("Workflow Training Review: Nutzer hat die Vor-Speicher-Review bestaetigt")) {
        updateAiThinkingDetail("Die Review ist bestätigt; ich bereite die finale Validierung vor.", "workflow-review");
        return true;
      }

      match = text.match(/^AI Agent Loop (\d+)\/(\d+):\s*(.*)$/);
      if (match) {
        aiThinkingState.retries = Number(match[1] || "0");
        updateAiThinkingDetail(
          `Ich denke erneut nach und korrigiere die Antwort (${match[1]}/${match[2]}): ${compactAiRetryReason(match[3])}`,
          "ai-retry");
        return true;
      }

      match = text.match(/^AI Agent Loop: abgebrochen nach (\d+) Versuchen:\s*(.*)$/);
      if (match) {
        updateAiThinkingDetail(
          `Ich stoppe die automatische Korrektur nach ${match[1]} Versuchen: ${compactAiRetryReason(match[2])}`,
          "ai-retry");
        return true;
      }

      match = text.match(/^AI Agent Loop: BRX-Fehlerkorrektur nach (\d+) Versuchen abgebrochen:\s*(.*)$/);
      if (match) {
        updateAiThinkingDetail(
          `Ich stoppe die BRX-Fehlerkorrektur nach ${match[1]} Versuchen: ${compactAiRetryReason(match[2])}`,
          "ai-retry");
        return true;
      }

      match = text.match(/^Workflow Training Loop (\d+)\/(\d+):\s*(.*)$/);
      if (match) {
        aiThinkingState.workflowRetries = Number(match[1] || "0");
        updateAiThinkingDetail(
          `Ich überarbeite den Workflow-Entwurf (${match[1]}/${match[2]}): ${compactAiRetryReason(match[3])}`,
          "workflow-retry");
        return true;
      }

      match = text.match(/^Workflow Training Loop: abgebrochen nach (\d+) Versuchen:\s*(.*)$/);
      if (match) {
        updateAiThinkingDetail(
          `Ich stoppe die Workflow-Korrektur nach ${match[1]} Versuchen: ${compactAiRetryReason(match[2])}`,
          "workflow-retry");
        return true;
      }

      if (text.includes("AI Kontext: automatisch minimiert")) {
        updateAiThinkingDetail("Ich kürze den Kontext automatisch, damit die Anfrage in das Modellfenster passt.", "ai-context");
        return true;
      }

      if (text.includes("AI Workflow: Antwort wurde vom Modell wegen Tokenlimit abgeschnitten")) {
        updateAiThinkingDetail("Die Workflow-Antwort war zu lang; ich fordere eine kürzere, gültige Antwort an.", "workflow-retry");
        return true;
      }

      if (text.includes("AI Workflow: abgeschnittene ask_user Rueckfrage rekonstruiert")) {
        updateAiThinkingDetail("Die Workflow-Antwort war abgeschnitten; ich zeige die erkennbare Rückfrage an.", "workflow-retry");
        return true;
      }

      return false;
    }

    function batchSummaryTextFromLog(payload) {
      const text = String(payload || "");
      let completed = null;
      let requested = null;
      let failed = null;

      try {
        const result = JSON.parse(text);
        if (result && typeof result === "object") {
          completed = Number.isFinite(Number(result.actionsCompleted)) ? Number(result.actionsCompleted) : completed;
          requested = Number.isFinite(Number(result.actionsRequested)) ? Number(result.actionsRequested) : requested;
          failed = Number.isFinite(Number(result.failed)) ? Number(result.failed) : failed;
        }
      } catch {
        const completedMatch = text.match(/"actionsCompleted"\s*:\s*(\d+)/);
        const requestedMatch = text.match(/"actionsRequested"\s*:\s*(\d+)/);
        const failedMatch = text.match(/"failed"\s*:\s*(\d+)/);
        if (completedMatch) {
          completed = Number(completedMatch[1]);
        }
        if (requestedMatch) {
          requested = Number(requestedMatch[1]);
        }
        if (failedMatch) {
          failed = Number(failedMatch[1]);
        }
      }

      if (completed !== null && requested !== null) {
        if (failed && failed > 0) {
          return `BRX meldet: ${completed}/${requested} Aktionen abgeschlossen, ${failed} fehlgeschlagen.`;
        }
        return `BRX meldet: ${completed}/${requested} Aktionen abgeschlossen.`;
      }
      return "BRX meldet: Batch-Ausführung abgeschlossen.";
    }

    function updateBatchThinking(text) {
      addThinkingDetail(text, { key: "batch-progress" });
    }

    function addBrxThinkingDetailFromLog(line) {
      const text = stripLogTimestamp(line);
      let match = text.match(/^AI Agent: Nutzer bestaetigt; fuehre (\d+) Aktionen nacheinander aus/);
      if (match) {
        batchThinkingState = { active: true, current: 0, total: Number(match[1] || "0") };
        addThinkingDetail(`Bestätigt. Ich führe ${match[1]} Aktionen nacheinander aus.`);
        return true;
      }

      match = text.match(/^AI Agent: Nutzer bestaetigt; fuehre ([\w.]+) ueber ([\w.]+) aus/);
      if (match) {
        batchThinkingState = { active: false, current: 0, total: 0 };
        addThinkingDetail(`Bestätigt. Ich führe ${toolDisplayName(match[1])} in BricsCAD aus.`);
        return true;
      }

      match = text.match(/^Qt -> BRX: actions\.validate Batch-Aktion (\d+)\/(\d+)/);
      if (match) {
        batchThinkingState = { active: true, current: Number(match[1] || "0"), total: Number(match[2] || "0") };
        updateBatchThinking(`Ich prüfe Aktion ${match[1]}/${match[2]} in BricsCAD.`);
        return true;
      }

      match = text.match(/^BRX Preflight: Batch-Aktion (\d+)\/(\d+) gueltig/);
      if (match) {
        batchThinkingState = { active: true, current: Number(match[1] || "0"), total: Number(match[2] || "0") };
        updateBatchThinking(`BRX bestätigt Aktion ${match[1]}/${match[2]}.`);
        return true;
      }

      match = text.match(/^BRX Preflight: Batch-Aktion (\d+)\/(\d+) abgelehnt:\s*(.*)$/);
      if (match) {
        addThinkingDetail(`BRX stoppt Aktion ${match[1]}/${match[2]}: ${compactLogText(match[3])}`);
        return true;
      }

      match = text.match(/^Qt -> BRX Batch (\d+)\/(\d+): ([\w.]+) saveBefore=(true|false)/);
      if (match) {
        const saveHint = match[4] === "true" ? " mit Sicherung" : "";
        batchThinkingState = { active: true, current: Number(match[1] || "0"), total: Number(match[2] || "0") };
        updateBatchThinking(`Ich führe Aktion ${match[1]}/${match[2]} in BricsCAD aus: ${toolDisplayName(match[3])}${saveHint}.`);
        return true;
      }

      match = text.match(/^Qt -> BRX: actions\.validate (\d+) Aktion\(en\)/);
      if (match) {
        const count = Number(match[1] || "0");
        addThinkingDetail(count > 1
          ? `Ich lasse ${count} geplante Aktionen von BRX prüfen.`
          : "Ich lasse die geplante Aktion von BRX prüfen.");
        return true;
      }

      if (text.includes("BRX Preflight: gueltig mit Warnungen")) {
        addThinkingDetail("BRX bestätigt den Vorschlag mit Hinweisen.");
        return true;
      }

      if (text.includes("BRX Preflight: gueltig")) {
        addThinkingDetail("BRX bestätigt: der Vorschlag ist ausführbar.");
        return true;
      }

      match = text.match(/^BRX Preflight: abgelehnt:\s*(.*)$/);
      if (match) {
        addThinkingDetail(`BRX lehnt den Vorschlag ab: ${compactLogText(match[1])}`);
        return true;
      }

      match = text.match(/^BRX -> Qt: ERROR ([\w.]+)\s*(.*)$/);
      if (match) {
        addThinkingDetail(`BRX meldet einen Fehler bei ${toolDisplayName(match[1])}: ${compactLogText(match[2])}`);
        return true;
      }

      match = text.match(/^BRX -> Qt: ([\w.]+) ausgefuehrt/);
      if (match) {
        if (batchThinkingState.active && batchThinkingState.total > 1) {
          updateBatchThinking(`BRX meldet: Aktion ${batchThinkingState.current}/${batchThinkingState.total} abgeschlossen.`);
        } else {
          addThinkingDetail(`BRX meldet: ${toolDisplayName(match[1])} abgeschlossen.`);
        }
        return true;
      }

      match = text.match(/^BRX Batch:\s*(.*)$/);
      if (match) {
        batchThinkingState = { active: false, current: 0, total: 0 };
        addThinkingDetail(batchSummaryTextFromLog(match[1]));
        return true;
      }

      return false;
    }

    function handleBridgeLogLine(line) {
      const text = String(line || "");
      if (text.includes("Qt -> BRX: capabilities.list")) {
        if (!shouldShowBrxCapabilitiesInChat()) {
          return;
        }
        setCapabilitiesIndicator("loading", "Lade BRX-Capabilities");
        return;
      }
      if (text.includes("BRX -> Qt: ERROR capabilities.list")) {
        if (!shouldShowBrxCapabilitiesInChat()) {
          return;
        }
        setCapabilitiesIndicator("failed", "BRX-Capabilities fehlgeschlagen");
        return;
      }
      const match = text.match(/BRX -> Qt: (\d+) Capabilities, (\d+) Commands, (\d+) Action-Tools/);
      if (match) {
        if (!shouldShowBrxCapabilitiesInChat()) {
          return;
        }
        setCapabilitiesIndicator("done", `BRX-Capabilities geladen: ${match[1]} Methoden, ${match[2]} Commands, ${match[3]} Action-Tools`);
        return;
      }
      if (addAiThinkingDetailFromLog(text)) {
        return;
      }
      const loopMatch = text.match(/AI Agent Loop[^:]*: .*/);
      if (loopMatch) {
        addThinkingDetail(`Ich prüfe die Antwort erneut: ${loopMatch[0].replace(/^AI Agent Loop[^:]*:\s*/, "")}`);
        return;
      }
      if (text.includes("AI Agent: fasse BRX Ergebnis fuer den Chat zusammen")) {
        pendingExecutionSummary = true;
        addThinkingDetail("Ich erstelle eine kurze Abschlusszusammenfassung der Ausführung.");
        return;
      }
      if (text.includes("AI JSON:")) {
        return;
      }
      if (text.includes("AI Vorschlag:")) {
        addThinkingDetail(`Ich habe einen ausführbaren Vorschlag vorbereitet: ${text.replace(/^\[[^\]]+\]\s*AI Vorschlag:\s*/, "")}`);
        return;
      }
      if (text.includes("AI -> Qt Kontextabfrage")) {
        addThinkingDetail(`Ich hole Zeichnungskontext: ${text.replace(/^\[[^\]]+\]\s*AI -> Qt Kontextabfrage:\s*/, "")}`);
        return;
      }
      if (addBrxThinkingDetailFromLog(text)) {
        return;
      }
      if ((isBusy || thinkingIndicator) && text.includes("BRX -> Qt Kontext")) {
        addThinkingDetail(`Ich berücksichtige den BRX-Kontext: ${text.replace(/^\[[^\]]+\]\s*/, "")}`);
      }
    }

        bridge.ready();
        syncTrainingModeToQt();
      });
    } else {
      setLocalAiStatus("Lokale AI nicht prüfbar", false);
      setBrxStatus("Qt Bridge nicht bereit", false);
    }

    input.focus();
  </script>
</body>
