<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barebone AI Assistent</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["\\[", "\\]"], ["$$", "$$"]],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      },
      startup: {
        pageReady: () => MathJax.startup.defaultPageReady().then(() => {
          if (typeof window.__bareboneTypesetQueuedMath === "function") {
            return window.__bareboneTypesetQueuedMath();
          }
          return undefined;
        })
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>

  <style>
    :root {
      --sidebar-width: 270px;
      --bg: #ffffff;
      --surface: #f9f9f9;
      --surface-hover: #ececec;
      --composer-bg: #f4f4f4;
      --composer-border: #dedede;
      --text: #171717;
      --text-muted: #707070;
      --border: #e5e5e5;
      --user-bubble: #f4f4f4;
      --button-bg: #111111;
      --button-text: #ffffff;
      --warning-bg: #fff7ed;
      --warning-border: #f7931a;
      --success-bg: #ecfdf5;
      --success-border: #10a37f;
      --danger-bg: #fef2f2;
      --danger-border: #ef4444;
      --table-bg: #ffffff;
      --table-head: #eef4f1;
      --table-stripe: #f7faf9;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 26px;
      --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.08);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #212121;
        --surface: #171717;
        --surface-hover: #2f2f2f;
        --composer-bg: #303030;
        --composer-border: #474747;
        --text: #ececec;
        --text-muted: #a6a6a6;
        --border: #343434;
        --user-bubble: #303030;
        --button-bg: #ffffff;
        --button-text: #111111;
        --warning-bg: #2a2117;
        --warning-border: #f7931a;
        --success-bg: rgba(16, 163, 127, 0.14);
        --success-border: #10a37f;
        --danger-bg: rgba(239, 68, 68, 0.14);
        --danger-border: #ef4444;
        --table-bg: #1f1f1f;
        --table-head: #26322e;
        --table-stripe: #262626;
        --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      background: var(--bg);
    }

    .app.sidebar-collapsed {
      --sidebar-width: 66px;
    }

    .sidebar {
      min-width: 0;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .app.sidebar-collapsed .sidebar {
      padding: 10px 8px;
      align-items: stretch;
      overflow: hidden;
    }

    .app.sidebar-collapsed .sidebar-header {
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    .app.sidebar-collapsed .sidebar-title {
      display: none;
    }

    .sidebar-header,
    .topbar-left,
    .topbar-right,
    .composer-footer,
    .composer-tools,
    .composer-right,
    .proposal-actions {
      display: flex;
      align-items: center;
    }

    .sidebar-header {
      justify-content: space-between;
      gap: 8px;
    }

    .topbar-left,
    .topbar-right,
    .composer-tools,
    .composer-right,
    .proposal-actions {
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text);
      display: inline-grid;
      place-items: center;
      transition: background 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--surface-hover);
    }

    .new-chat-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.15s ease;
    }

    .new-chat-btn:hover {
      background: var(--surface-hover);
    }

    .app.sidebar-collapsed .new-chat-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      justify-content: center;
      align-self: center;
      font-size: 0;
      gap: 0;
    }

    .sidebar-search {
      height: 40px;
      padding: 0 10px;
      border-radius: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .sidebar-search input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .sidebar-search input::placeholder {
      color: var(--text-muted);
    }

    .app.sidebar-collapsed .sidebar-search {
      display: none;
    }

    .sidebar-title {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 10px 2px;
    }

    .chat-list {
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-right: 2px;
    }

    .chat-item {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 0;
      border-radius: 10px;
    }

    .chat-link {
      width: 100%;
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      border-radius: 10px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
    }

    .chat-title {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-short {
      display: none;
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }

    .chat-delete {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      margin-right: 3px;
      flex-shrink: 0;
    }

    .chat-item:hover,
    .chat-item:focus-within,
    .chat-link.active {
      background: var(--surface-hover);
    }

    .chat-item:hover .chat-delete,
    .chat-item:focus-within .chat-delete {
      opacity: 1;
      pointer-events: auto;
    }

    .chat-delete:hover {
      color: var(--text);
      background: var(--bg);
    }

    .chat-item.hidden {
      display: none;
    }

    .app.sidebar-collapsed .chat-list {
      align-items: center;
      padding-right: 0;
    }

    .app.sidebar-collapsed .chat-item {
      width: 40px;
      height: 40px;
      justify-content: center;
    }

    .app.sidebar-collapsed .chat-link {
      width: 40px;
      height: 40px;
      padding: 0;
      justify-content: center;
    }

    .app.sidebar-collapsed .chat-title {
      display: none;
    }

    .app.sidebar-collapsed .chat-short {
      display: block;
    }

    .app.sidebar-collapsed .chat-delete {
      position: absolute;
      right: -2px;
      top: -2px;
      width: 18px;
      height: 18px;
      margin: 0;
      border-radius: 50%;
      background: var(--surface);
    }

    .main {
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      height: 56px;
      flex-shrink: 0;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }

    .model-title {
      color: var(--text);
      padding: 8px 10px;
      font-size: 18px;
      font-weight: 600;
    }

    .status-pill {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .status-pill.thinking {
      color: var(--text);
      background: var(--warning-bg);
      border-color: var(--warning-border);
    }

    .status-pill.connected {
      color: var(--text);
      background: var(--success-bg);
      border-color: var(--success-border);
    }

    .status-pill.disconnected {
      color: var(--text);
      background: var(--danger-bg);
      border-color: var(--danger-border);
    }

    .status-pill.checking {
      color: var(--text);
      background: var(--warning-bg);
      border-color: var(--warning-border);
    }

    .chat {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: scroll;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      padding: 18px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      width: min(820px, 100%);
      margin: 0 auto;
      display: flex;
      gap: 14px;
      line-height: 1.55;
      font-size: 15px;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant,
    .message.system {
      justify-content: flex-start;
      align-items: flex-start;
    }

    .message-content {
      max-width: 72%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .user .message-content {
      align-items: flex-end;
    }

    .assistant .message-content,
    .system .message-content {
      max-width: calc(100% - 46px);
    }

    .assistant-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bubble {
      position: relative;
      max-width: 100%;
      color: var(--text);
      word-wrap: break-word;
      white-space: normal;
    }

    .message-markdown {
      white-space: normal;
    }

    .message-markdown p,
    .message-markdown .message-heading,
    .message-markdown .message-table-wrap,
    .message-markdown .message-code-wrap,
    .message-markdown .message-list {
      margin: 0 0 12px;
    }

    .message-markdown > :last-child {
      margin-bottom: 0;
    }

    .message-heading {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.45;
    }

    .message-table-wrap {
      max-width: 100%;
      overflow-x: auto;
      border: 1px solid var(--composer-border);
      border-radius: 8px;
      background: var(--table-bg);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
    }

    .message-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      background: var(--table-bg);
      font-size: 14px;
      line-height: 1.45;
      white-space: normal;
    }

    .message-table th,
    .message-table td {
      padding: 9px 11px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }

    .message-table th {
      background: var(--table-head);
      font-weight: 700;
    }

    .message-table tbody tr:nth-child(even) td {
      background: var(--table-stripe);
    }

    .message-table tr:last-child td {
      border-bottom: 0;
    }

    .message-table strong {
      font-weight: 700;
    }

    .message-code-wrap {
      max-width: 100%;
      overflow: hidden;
      border: 1px solid var(--composer-border);
      border-radius: 8px;
      background: var(--surface);
    }

    .message-code-lang {
      padding: 7px 11px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
    }

    .message-code {
      margin: 0;
      padding: 12px 14px;
      overflow-x: auto;
      color: var(--text);
      background: transparent;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      white-space: pre;
      tab-size: 2;
    }

    .message-code code {
      font: inherit;
      color: inherit;
    }

    .message-inline-code {
      border-radius: 5px;
      padding: 1px 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      font: 0.92em ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .message-list {
      padding-left: 24px;
    }

    .message-list li {
      padding-left: 4px;
      margin: 0 0 7px;
    }

    .message-list li:last-child {
      margin-bottom: 0;
    }

    .message-footer {
      min-height: 26px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .message:hover .message-footer,
    .message:focus-within .message-footer {
      opacity: 1;
      pointer-events: auto;
    }

    .message-action {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      display: grid;
      place-items: center;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .message-action:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .message-action.copied {
      color: var(--success-border);
      background: var(--success-bg);
    }

    .bubble mjx-container[display="true"] {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .user .bubble {
      background: var(--user-bubble);
      padding: 12px 16px;
      border-radius: 22px;
      border-top-right-radius: 6px;
    }

    .assistant .bubble,
    .system .bubble {
      background: transparent;
      padding: 2px 0 0;
      max-width: 100%;
    }

    .message.thinking-indicator {
      opacity: 0.92;
    }

    .thinking-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.55;
      padding-top: 2px;
    }

    .thinking-toggle {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      line-height: 1.55;
    }

    .thinking-toggle:hover {
      color: var(--text);
    }

    .thinking-chevron {
      width: 14px;
      height: 14px;
      transition: transform 0.15s ease;
    }

    .thinking-toggle[aria-expanded="true"] .thinking-chevron {
      transform: rotate(90deg);
    }

    .thinking-details {
      display: none;
      margin: 8px 0 0 28px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: normal;
    }

    .thinking-details.open {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .thinking-detail-item {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .thinking-detail-item.hidden {
      display: none;
    }

    .loading-spinner {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid var(--border);
      border-top-color: var(--text-muted);
      animation: spin 0.85s linear infinite;
      flex-shrink: 0;
    }

    .status-mark {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .status-mark.done {
      color: #0f7b55;
      background: rgba(16, 163, 127, 0.12);
    }

    .status-mark.failed {
      color: #b42318;
      background: rgba(180, 35, 24, 0.12);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .meta {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .proposal-panel {
      width: min(820px, calc(100% - 40px));
      margin: 0 auto 12px;
      padding: 12px 14px;
      border: 1px solid var(--warning-border);
      border-radius: 16px;
      background: var(--warning-bg);
      display: none;
      gap: 10px;
      flex-direction: column;
      flex-shrink: 0;
    }

    .proposal-panel.visible {
      display: flex;
    }

    .proposal-title {
      font-weight: 800;
      font-size: 15px;
    }

    .proposal-details {
      color: var(--text);
      font-size: 15px;
      white-space: pre-wrap;
      line-height: 1.55;
      max-height: 170px;
      overflow: auto;
    }

    .message.inline-proposal .bubble {
      max-width: calc(100% - 46px);
    }

    .inline-proposal-card {
      color: var(--text);
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .inline-proposal-title {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .inline-proposal-summary {
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    .inline-proposal-toggle {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .inline-proposal-toggle:hover {
      color: var(--text);
    }

    .inline-proposal-toggle[aria-expanded="true"] .thinking-chevron {
      transform: rotate(90deg);
    }

    .inline-proposal-details {
      display: none;
      margin-top: 8px;
      padding-left: 12px;
      border-left: 1px solid rgba(247, 147, 26, 0.5);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 160px;
      overflow: auto;
    }

    .inline-proposal-details.open {
      display: block;
    }

    .proposal-actions {
      justify-content: flex-end;
    }

    .inline-proposal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .confirm-btn,
    .cancel-btn,
    .tool-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
    }

    .confirm-btn {
      background: var(--button-bg);
      color: var(--button-text);
      border-color: var(--button-bg);
    }

    .confirm-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .composer-wrap {
      flex-shrink: 0;
      padding: 0 20px 16px;
      background: var(--bg);
    }

    .composer {
      width: min(820px, 100%);
      margin: 0 auto;
      background: var(--composer-bg);
      border: 1px solid var(--composer-border);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }

    .composer textarea {
      width: 100%;
      min-height: 58px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 2px 4px 10px;
      font-size: 16px;
      line-height: 1.45;
    }

    .composer textarea::placeholder {
      color: var(--text-muted);
    }

    .document-context {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 2px 10px;
    }

    .document-context[hidden] {
      display: none;
    }

    .document-chip {
      max-width: 100%;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      padding: 4px 7px 4px 10px;
      font-size: 13px;
    }

    .document-chip.loading {
      color: var(--text-muted);
    }

    .document-chip.error {
      color: #b42318;
      background: #fff1f0;
      border-color: #ffd6d2;
    }

    .document-chip-name {
      min-width: 0;
      max-width: 280px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .document-chip-meta {
      color: var(--text-muted);
      white-space: nowrap;
    }

    .document-chip-remove {
      width: 22px;
      height: 22px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      display: grid;
      place-items: center;
      padding: 0;
    }

    .document-chip-remove:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .composer-footer {
      justify-content: space-between;
      gap: 12px;
    }

    .composer-tools {
      position: relative;
    }

    .mode-status-btn {
      pointer-events: none;
      cursor: default;
      color: var(--text-muted);
      background: var(--surface);
      opacity: 1;
    }

    .context-meter {
      --context-fill: 0deg;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px 5px 7px;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
    }

    .context-ring {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: conic-gradient(var(--text) var(--context-fill), var(--border) 0deg);
      display: grid;
      place-items: center;
    }

    .context-ring::after {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--surface);
    }

    .context-meter.warn .context-ring {
      background: conic-gradient(var(--warning-border) var(--context-fill), var(--border) 0deg);
    }

    .context-meter.full .context-ring {
      background: conic-gradient(#d92d20 var(--context-fill), var(--border) 0deg);
    }

    .context-meter.unknown .context-ring {
      background: conic-gradient(var(--text-muted) 70deg, var(--border) 0deg);
      opacity: 0.7;
    }

    .context-meter.minimized .context-label::after {
      content: " komprimiert";
      color: var(--warning-border);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: var(--button-bg);
      color: var(--button-text);
      display: grid;
      place-items: center;
    }

    .tools-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      width: 220px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--composer-bg);
      box-shadow: var(--shadow-soft);
      display: none;
      z-index: 20;
    }

    .tools-menu.open {
      display: block;
    }

    .tools-menu-title {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px 8px;
      text-transform: uppercase;
    }

    .reasoning-option {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      text-align: left;
    }

    .reasoning-option:hover,
    .reasoning-option.active {
      background: var(--surface-hover);
    }

    .reasoning-check {
      width: 16px;
      color: var(--warning-border);
      visibility: hidden;
    }

    .reasoning-option.active .reasoning-check {
      visibility: visible;
    }

    .mode-status-btn.training-active {
      border-color: var(--warning-border);
      color: var(--text);
    }

    .send-btn:disabled,
    textarea:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .disclaimer {
      width: min(820px, 100%);
      margin: 8px auto 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .messages::-webkit-scrollbar,
    .chat-list::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }

    .chat-list::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 999px;
    }

    .messages:hover::-webkit-scrollbar-thumb {
      background: var(--text-muted);
    }

    .chat-list:hover::-webkit-scrollbar-thumb {
      background: var(--surface-hover);
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .topbar {
        padding: 10px 12px;
      }

      .messages {
        padding: 12px 12px 22px;
      }

      .bubble {
        max-width: 100%;
      }

      .assistant .bubble,
      .system .bubble {
        max-width: 100%;
      }

      .composer-wrap {
        padding: 0 10px 12px;
      }
    }
  </style>
</head>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    const app = document.getElementById("app");
    const messages = document.getElementById("messages");
    const form = document.getElementById("composer");
    const input = document.getElementById("prompt-input");
    const sendButton = document.getElementById("send-button");
    const agentStatus = document.getElementById("agent-status");
    const localAiStatus = document.getElementById("local-ai-status");
    const brxStatus = document.getElementById("brx-status");
    const proposalPanel = document.getElementById("proposal-panel");
    const proposalTitle = document.getElementById("proposal-title");
    const proposalDetails = document.getElementById("proposal-details");
    const proposalConfirm = document.getElementById("proposal-confirm");
    const proposalCancel = document.getElementById("proposal-cancel");
    const newChatButton = document.getElementById("new-chat-button");
    const attachButton = document.getElementById("attach-button");
    const documentFileInput = document.getElementById("document-file-input");
    const documentContext = document.getElementById("document-context");
    const chatSearch = document.getElementById("chat-search");
    const chatList = document.getElementById("chat-list");
    const sidebarToggle = document.getElementById("sidebar-toggle");
    const toolsButton = document.getElementById("tools-button");
    const modeIndicator = document.getElementById("mode-indicator");
    const contextMeter = document.getElementById("context-meter");
    const contextLabel = document.getElementById("context-label");
    const toolsMenu = document.getElementById("tools-menu");
    const reasoningOptions = Array.from(document.querySelectorAll(".reasoning-option[data-reasoning]"));
    const modeOptions = Array.from(document.querySelectorAll(".mode-option"));

    const storageKey = "bareboneQt.aiAssistant.sessions.v1";
    const reasoningStorageKey = "bareboneQt.aiAssistant.reasoning.v1";
    const chatModeStorageKey = "bareboneQt.aiAssistant.mode.v1";
    const trainingModeStorageKey = "bareboneQt.aiAssistant.trainingMode.v1";
    const sidebarCollapsedStorageKey = "bareboneQt.aiAssistant.sidebarCollapsed.v1";
    let bridge = null;
    let sessions = [];
    let activeSessionId = "";
    let startupFreshSessionId = "";
    let chatCounter = 1;
    let sidebarCollapsed = false;
    let isBusy = false;
    let thinkingIndicator = null;
    let thinkingDetailsList = null;
    let thinkingDetailCount = 0;
    let pendingExecutionSummary = false;
    let batchThinkingState = { active: false, current: 0, total: 0 };
    let aiThinkingState = { requests: 0, retries: 0, workflowRetries: 0 };
    let capabilitiesIndicator = null;
    let proposalInline = null;
    let reasoningEffort = "high";
    let chatMode = "bricscad";
    let trainingMode = false;
    let applyingClientState = false;
    let documentCounter = 0;
    let documentsLoading = 0;
    const sessionDocuments = new Map();
    const maxDocumentContextChars = 65000;
    const maxDocumentPageChars = 7000;

    function nowTime() {
      return `${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })} Uhr`;
    }

    function formatMessageTime(value) {
      const text = String(value || "").trim();
      const match = text.match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*Uhr)?$/);
      if (match) {
        return `${match[1].padStart(2, "0")}:${match[2]} Uhr`;
      }
      return text || nowTime();
    }

    function activeDocuments() {
      if (!sessionDocuments.has(activeSessionId)) {
        sessionDocuments.set(activeSessionId, []);
      }
      return sessionDocuments.get(activeSessionId);
    }

    function repairMojibakeText(text) {
      let value = String(text || "");
      if (!/[ÃÂâ]/.test(value)) {
        return value;
      }
      const replacements = [
        [/â€ž/g, "„"],
        [/â€œ/g, "“"],
        [/â€/g, "”"],
        [/â€™/g, "’"],
        [/â€˜/g, "‘"],
        [/â€“/g, "–"],
        [/â€”/g, "—"],
        [/â€¦/g, "…"],
        [/â€¯/g, " "],
        [/â€‘/g, "-"],
        [/Ã¤/g, "ä"],
        [/Ã¶/g, "ö"],
        [/Ã¼/g, "ü"],
        [/Ã„/g, "Ä"],
        [/Ã–/g, "Ö"],
        [/Ãœ/g, "Ü"],
        [/ÃŸ/g, "ß"],
        [/Ã©/g, "é"],
        [/Ã¨/g, "è"],
        [/Ã¡/g, "á"],
        [/Ã³/g, "ó"],
        [/Ã±/g, "ñ"],
        [/Ã§/g, "ç"],
        [/Â«/g, "«"],
        [/Â»/g, "»"],
        [/Â°/g, "°"],
        [/Â/g, ""]
      ];
      replacements.forEach(([pattern, replacement]) => {
        value = value.replace(pattern, replacement);
      });
      return value;
    }

    function normalizeDocumentText(text) {
      return repairMojibakeText(text)
        .replace(/\r\n/g, "\n")
        .replace(/\u0000/g, "")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{4,}/g, "\n\n\n")
        .trim();
    }

    function fileExtension(fileName) {
      const match = String(fileName || "").toLowerCase().match(/\.([a-z0-9]+)$/);
      return match ? match[1] : "";
    }

    function documentKindLabel(document) {
      if (document.kind === "pdf") {
        return `${document.pageCount || 0} Seiten`;
      }
      const chars = document.text ? document.text.length : 0;
      return `${chars.toLocaleString("de-DE")} Zeichen`;
    }

    function renderDocumentContext() {
      const docs = activeDocuments();
      documentContext.hidden = docs.length === 0;
      documentContext.replaceChildren();

      docs.forEach((doc) => {
        const chip = document.createElement("div");
        chip.className = "document-chip";
        chip.classList.toggle("loading", doc.status === "loading");
        chip.classList.toggle("error", doc.status === "error");

        const name = document.createElement("span");
        name.className = "document-chip-name";
        name.textContent = doc.name;
        name.title = doc.name;

        const meta = document.createElement("span");
        meta.className = "document-chip-meta";
        if (doc.status === "loading") {
          meta.textContent = "wird gelesen";
        } else if (doc.status === "error") {
          meta.textContent = doc.error || "nicht lesbar";
        } else {
          meta.textContent = documentKindLabel(doc);
        }

        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "document-chip-remove";
        remove.setAttribute("aria-label", `${doc.name} entfernen`);
        remove.textContent = "X";
        remove.addEventListener("click", () => removeDocument(doc.id));

        chip.appendChild(name);
        chip.appendChild(meta);
        chip.appendChild(remove);
        documentContext.appendChild(chip);
      });

      sendButton.disabled = isBusy || documentsLoading > 0;
    }

    function removeDocument(documentId) {
      const docs = activeDocuments();
      const index = docs.findIndex((document) => document.id === documentId);
      if (index >= 0) {
        docs.splice(index, 1);
        renderDocumentContext();
      }
    }

    function ensurePdfParserReady() {
      if (!window.pdfjsLib) {
        throw new Error("PDF-Parser konnte nicht geladen werden.");
      }
      if (!window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
    }

    async function extractPdf(file) {
      ensurePdfParserReady();
      const data = new Uint8Array(await file.arrayBuffer());
      const pdf = await window.pdfjsLib.getDocument({ data }).promise;
      const pages = [];
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        let text = "";
        content.items.forEach((item) => {
          text += item.str || "";
          text += item.hasEOL ? "\n" : " ";
        });
        pages.push({ page: pageNumber, text: normalizeDocumentText(text) });
      }
      return {
        kind: "pdf",
        type: "PDF",
        pageCount: pdf.numPages,
        pages,
        text: pages.map((page) => page.text).join("\n\n")
      };
    }

    async function extractDocx(file) {
      if (!window.mammoth || typeof window.mammoth.extractRawText !== "function") {
        throw new Error("Word-Parser konnte nicht geladen werden.");
      }
      const result = await window.mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      return {
        kind: "text",
        type: "Word DOCX",
        text: normalizeDocumentText(result.value)
      };
    }

    function stripRtf(text) {
      return normalizeDocumentText(String(text || "")
        .replace(/\\par[d]?/gi, "\n")
        .replace(/\\'[0-9a-f]{2}/gi, " ")
        .replace(/\\[a-z]+\d* ?/gi, "")
        .replace(/[{}]/g, " "));
    }

    function htmlToText(text) {
      const parsed = new DOMParser().parseFromString(text, "text/html");
      return normalizeDocumentText(parsed.body ? parsed.body.textContent : text);
    }

    async function extractTextFile(file, extension) {
      let text = await file.text();
      if (extension === "rtf") {
        text = stripRtf(text);
      } else if (extension === "html" || extension === "htm") {
        text = htmlToText(text);
      } else {
        text = normalizeDocumentText(text);
      }
      return {
        kind: "text",
        type: extension ? extension.toUpperCase() : "Text",
        text
      };
    }

    async function extractDocumentFile(file) {
      const extension = fileExtension(file.name);
      if (extension === "pdf") {
        return extractPdf(file);
      }
      if (extension === "docx") {
        return extractDocx(file);
      }
      if (extension === "doc") {
        throw new Error("Alte .doc-Dateien werden nicht direkt gelesen. Bitte als .docx, PDF oder Text exportieren.");
      }
      return extractTextFile(file, extension);
    }

    async function addDocumentFile(file) {
      const docs = activeDocuments();
      const document = {
        id: `document-${Date.now()}-${++documentCounter}`,
        name: file.name,
        status: "loading"
      };
      docs.push(document);
      documentsLoading += 1;
      renderDocumentContext();

      try {
        const extracted = await extractDocumentFile(file);
        Object.assign(document, extracted, { status: "ready", size: file.size });
      } catch (error) {
        document.status = "error";
        document.error = error && error.message ? error.message : "Datei konnte nicht gelesen werden.";
      } finally {
        documentsLoading = Math.max(0, documentsLoading - 1);
        renderDocumentContext();
      }
    }

    function requestedPageRanges(prompt, pageCount) {
      const ranges = [];
      const text = String(prompt || "");
      const pattern = /(?:seite|seiten|page|pages)\s*(\d{1,4})(?:\s*(?:-|–|—|bis|to)\s*(\d{1,4}))?/gi;
      let match = pattern.exec(text);
      while (match) {
        const start = Number.parseInt(match[1], 10);
        const end = match[2] ? Number.parseInt(match[2], 10) : start;
        if (Number.isFinite(start) && Number.isFinite(end)) {
          ranges.push({
            start: Math.max(1, Math.min(start, end, pageCount)),
            end: Math.min(pageCount, Math.max(start, end))
          });
        }
        match = pattern.exec(text);
      }
      return ranges.length ? ranges : null;
    }

    function selectedPdfPages(document, prompt, remainingChars) {
      const explicitRanges = requestedPageRanges(prompt, document.pageCount || document.pages.length);
      const pages = [];
      let remaining = remainingChars;
      let truncated = false;
      const ranges = explicitRanges || [{ start: 1, end: document.pages.length }];

      for (const range of ranges) {
        for (let pageNumber = range.start; pageNumber <= range.end; pageNumber += 1) {
          if (remaining <= 0) {
            truncated = true;
            break;
          }
          const page = document.pages.find((entry) => entry.page === pageNumber);
          if (!page || !page.text) {
            continue;
          }
          let text = page.text;
          if (text.length > maxDocumentPageChars) {
            text = text.slice(0, maxDocumentPageChars) + "\n[Seite gekürzt]";
            truncated = true;
          }
          if (text.length > remaining) {
            text = text.slice(0, remaining) + "\n[Kontextgrenze erreicht]";
            truncated = true;
          }
          remaining -= text.length;
          pages.push({ page: page.page, text });
        }
        if (remaining <= 0) {
          break;
        }
      }

      if (!explicitRanges && pages.length < document.pages.length) {
        truncated = true;
      }
      return { pages, truncated, explicit: !!explicitRanges };
    }

    function includedPagesLabel(pages, pageCount) {
      if (!pages.length) {
        return "keine Seiten";
      }
      const numbers = pages.map((page) => page.page);
      return `Seiten ${numbers[0]}-${numbers[numbers.length - 1]} von ${pageCount}`;
    }

    function buildDocumentContextForPrompt(prompt) {
      const readyDocuments = activeDocuments().filter((document) => document.status === "ready");
      if (!readyDocuments.length) {
        return {};
      }

      let remaining = maxDocumentContextChars;
      let truncated = false;
      const blocks = [];
      const documents = [];

      for (const document of readyDocuments) {
        if (remaining <= 0) {
          truncated = true;
          break;
        }

        if (document.kind === "pdf") {
          const selection = selectedPdfPages(document, prompt, remaining);
          const pageBlocks = selection.pages.map((page) => `--- Seite ${page.page} ---\n${page.text}`);
          const block = `[Dokument: ${document.name} | PDF | ${includedPagesLabel(selection.pages, document.pageCount)}]\n${pageBlocks.join("\n\n")}`;
          if (pageBlocks.length) {
            blocks.push(block);
            remaining -= block.length;
          }
          truncated = truncated || selection.truncated;
          documents.push({
            name: document.name,
            type: "PDF",
            pages: document.pageCount,
            included: includedPagesLabel(selection.pages, document.pageCount),
            selection: selection.explicit ? "requested-pages" : "leading-excerpt"
          });
          continue;
        }

        let text = document.text || "";
        let included = "vollständig";
        if (text.length > remaining) {
          text = text.slice(0, remaining) + "\n[Kontextgrenze erreicht]";
          included = "gekürzter Auszug";
          truncated = true;
        }
        blocks.push(`[Dokument: ${document.name} | ${document.type || "Text"} | ${included}]\n${text}`);
        remaining -= text.length;
        documents.push({
          name: document.name,
          type: document.type || "Text",
          chars: document.text ? document.text.length : 0,
          included
        });
      }

      const selectedText = blocks.join("\n\n").trim();
      if (!selectedText) {
        return {};
      }

      return {
        hasDocuments: true,
        selectedText,
        documents,
        truncated,
        maxChars: maxDocumentContextChars
      };
    }

      const number = Number(value || 0);
      if (!Number.isFinite(number) || number <= 0) {

    function applyContextBudget(info) {
      const percent = Math.max(0, Math.min(100, Number(info && info.percent) || 0));
      const maxTokens = Number(info && info.maxTokens) || 0;
      const usedTokens = Number(info && info.usedTokens) || 0;
      const available = !!(info && info.available);
      const state = info && typeof info.state === "string" ? info.state : (available ? "ok" : "unknown");
      const minimized = !!(info && info.minimized);
      const fill = Math.round((percent / 100) * 360);

      contextMeter.style.setProperty("--context-fill", `${fill}deg`);
      contextMeter.classList.toggle("unknown", state === "unknown" || !available);
      contextMeter.classList.toggle("warn", state === "warn");
      contextMeter.classList.toggle("full", state === "full");
      contextMeter.classList.toggle("minimized", minimized);
      contextLabel.textContent = available ? `${percent}%` : "Kontext";

      const model = info && info.model ? `\nModell: ${info.model}` : "";
      const detail = info && info.detail ? `\n${info.detail}` : "";
      contextMeter.title = available
        ? `Kontext: ${formatTokenCount(usedTokens)} / ${formatTokenCount(maxTokens)} Tokens${model}${detail}`
        : `Kontextlaenge wird von LM Studio noch nicht gemeldet${model}${detail}`;
    }

    function germanizeText(text) {
      let value = repairMojibakeText(text);
      const replacements = [
        [/Bestaetigung/g, "Bestätigung"],
        [/bestaetigen/g, "bestätigen"],
        [/Bestaetigt/g, "Bestätigt"],
        [/bestaetigt/g, "bestätigt"],
        [/Ausfuehren/g, "Ausführen"],
        [/ausfuehren/g, "ausführen"],
        [/Ausfuehrung/g, "Ausführung"],
        [/ausfuehrung/g, "ausführung"],
        [/ausfuehrbaren/g, "ausführbaren"],
        [/ausfuehrbare/g, "ausführbare"],
        [/ausgefuehrt/g, "ausgeführt"],
        [/Fuehre/g, "Führe"],
        [/fuehre/g, "führe"],
        [/fuer/g, "für"],
        [/Fuer/g, "Für"],
        [/ueber/g, "über"],
        [/Ueber/g, "Über"],
        [/gueltig/g, "gültig"],
        [/ungueltig/g, "ungültig"],
        [/moechtest/g, "möchtest"],
        [/Moechtest/g, "Möchtest"],
        [/pruefe/g, "prüfe"],
        [/Pruefe/g, "Prüfe"],
        [/beruecksichtige/g, "berücksichtige"],
        [/Beruecksichtige/g, "Berücksichtige"],
        [/Rueckfrage/g, "Rückfrage"],
        [/rueckfrage/g, "rückfrage"],
        [/Hoehe/g, "Höhe"],
        [/hoehe/g, "höhe"],
        [/Laenge/g, "Länge"],
        [/laenge/g, "länge"],
        [/Flaeche/g, "Fläche"],
        [/flaeche/g, "fläche"],
        [/enthaelt/g, "enthält"],
        [/verfuegbar/g, "verfügbar"],
        [/uebersprungen/g, "übersprungen"],
        [/gewaehlt/g, "gewählt"],
        [/waehrend/g, "während"],
        [/laeuft/g, "läuft"]
      ];
      for (const [pattern, replacement] of replacements) {
        value = value.replace(pattern, replacement);
      }
      return value;
    }

    function looksLikeReasoningLeak(text) {
      const lower = String(text || "").slice(0, 6000).toLowerCase();
      if (lower.startsWith("the user asked")
        || lower.startsWith("we need to")
        || lower.includes("developer message")
        || lower.includes("system message says")
        || lower.includes("we need to ensure")) {
        return true;
      }
      const markers = [
        "the user asked",
        "the user wants",
        "we need to",
        "we should",
        "we can",
        "we must",
        "let's produce",
        "final answer",
        "developer message",
        "instructions"
      ];
      return markers.reduce((count, marker) => count + (lower.includes(marker) ? 1 : 0), 0) >= 3;
    }

    function removeReasoningLeakText(text) {
      let value = germanizeText(text).trim();
      if (!looksLikeReasoningLeak(value)) {
        return value;
      }

      const lower = value.toLowerCase();
      const markers = [
        "ok let's produce final answer:",
        "let's produce final answer:",
        "final answer:",
        "final response:"
      ];
      let markerIndex = -1;
      let markerLength = 0;
      markers.forEach((marker) => {
        const index = lower.lastIndexOf(marker);
        if (index >= markerIndex) {
          markerIndex = index;
          markerLength = marker.length;
        }
      });
      if (markerIndex >= 0) {
        value = value.slice(markerIndex + markerLength).trim();
      }

      const headingIndex = value.indexOf("**");
      if (headingIndex > 0 && headingIndex < 160) {
        value = value.slice(headingIndex).trim();
      }

      if (!value || looksLikeReasoningLeak(value) || value.toLowerCase().includes("developer message")) {
        return "Die AI-Antwort enthielt interne Analyse und wurde ausgeblendet. Bitte sende die Anfrage erneut.";
      }
      return value;
    }

    function createSession(title, mode = chatMode) {
      const normalizedMode = normalizeChatMode(mode);
      return {
        id: `session-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
        title,
        mode: normalizedMode,
        userNamed: false,

    function ensureStartupFreshSession() {
      if (startupFreshSessionId) {
        const existing = sessions.find((session) => session.id === startupFreshSessionId);
        if (existing) {
          activeSessionId = existing.id;
          chatMode = normalizeChatMode(existing.mode || chatMode || "bricscad");
          existing.mode = chatMode;
          return existing;
        }
      }

      const mode = normalizeChatMode(chatMode || storedChatMode());
      const session = createSession(modeTitle(mode), mode);
      sessions.unshift(session);
      activeSessionId = session.id;
      startupFreshSessionId = session.id;
      chatMode = mode;
      session.mode = chatMode;
      return session;
    }

    function readableStoredMessageText(speaker, text) {
      if (speaker !== "AI") {
        return germanizeText(text);
      }
      const cleaned = removeReasoningLeakText(text)
        .replaceAll("<|channel|>final", "")
        .replaceAll("<|constrain|>json", "")
        .replaceAll("<|message|>", "")
        .trim();
      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");
      if (firstBrace < 0 || lastBrace <= firstBrace) {
        return removeReasoningLeakText(text);
      }
      try {
        const parsed = JSON.parse(cleaned.slice(firstBrace, lastBrace + 1));
        if (parsed && typeof parsed.message === "string" && parsed.message.trim()) {
          return germanizeText(parsed.message.trim());
        }
      } catch {
        return removeReasoningLeakText(text);
      }
      return removeReasoningLeakText(text);
    }

    function normalizeMessage(message) {
      const speaker = message.speaker || "AI";
      return {
        speaker,
        message: readableStoredMessageText(speaker, message.message || ""),
        time: formatMessageTime(message.time)
      };

    function normalizeSession(session, index) {
      const fallback = createSession(index === 0 ? "BricsCAD AI Assistent" : `Neue Sitzung ${index + 1}`);
      return {
        id: typeof session.id === "string" && session.id ? session.id : fallback.id,
        title: typeof session.title === "string" && session.title ? session.title : fallback.title,
        mode: normalizeChatMode(session.mode || "bricscad"),
        userNamed: !!session.userNamed,
        messages: Array.isArray(session.messages) && session.messages.length
          ? session.messages.map(normalizeMessage)
          : fallback.messages,
        proposal: session.proposal || null
      };
    }

      if (!sessions.length) {
        sessions = [createSession("BricsCAD AI Assistent")];

      chatMode = storedChatMode();

    function fallbackCopyToClipboard(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      const copied = document.execCommand("copy");
      textarea.remove();
      return copied ? Promise.resolve() : Promise.reject(new Error("Clipboard fallback failed"));
    }

    function browserCopyToClipboard(text) {
      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        return navigator.clipboard.writeText(text).catch(() => fallbackCopyToClipboard(text));
      }
      return fallbackCopyToClipboard(text);
    }

    function copyViaQtBridge(text) {
      if (!bridge || typeof bridge.copyText !== "function") {
        return Promise.reject(new Error("Qt clipboard bridge unavailable"));
      }

      return new Promise((resolve, reject) => {
        let settled = false;
        const finish = (ok = true) => {
          if (settled) {
            return;
          }
          settled = true;
          if (ok === false) {
            reject(new Error("Qt clipboard bridge rejected copy"));
          } else {
            resolve();
          }
        };

        try {
          bridge.copyText(text, finish);
          setTimeout(() => finish(true), 250);
        } catch (error) {
          reject(error);
        }
      });
    }

    function copyToClipboard(text) {
      return copyViaQtBridge(text).catch(() => browserCopyToClipboard(text));
    }

    function createMessageCopyButton(text) {
      const copyIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>';
      const copiedIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>';
      const button = document.createElement("button");
      button.className = "message-action message-copy";
      button.type = "button";
      button.title = "Kopieren";
      button.setAttribute("aria-label", "Nachricht kopieren");
      button.innerHTML = copyIcon;
      button.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        copyToClipboard(text).then(() => {
          button.classList.add("copied");
          button.innerHTML = copiedIcon;
          button.title = "Kopiert";
          button.setAttribute("aria-label", "Nachricht kopiert");
          setTimeout(() => {
            button.classList.remove("copied");
            button.innerHTML = copyIcon;
            button.title = "Kopieren";
            button.setAttribute("aria-label", "Nachricht kopieren");
          }, 1200);
        }).catch(() => {
          button.title = "Kopieren fehlgeschlagen";
          setTimeout(() => {
            button.classList.remove("copied");
            button.innerHTML = copyIcon;
            button.title = "Kopieren";
          }, 1200);
        });
      });
      return button;
    }

    function splitMarkdownTableRow(line) {
      let value = String(line || "").trim();
      if (!value.includes("|")) {
        return null;
      }
      if (value.startsWith("|")) {
        value = value.slice(1);
      }
      if (value.endsWith("|")) {
        value = value.slice(0, -1);
      }
      return value.split("|").map((cell) => cell.trim());
    }

    function isMarkdownTableSeparator(line) {
      const cells = splitMarkdownTableRow(line);
      return !!cells && cells.length > 1 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function normalizeMarkdownHeading(line) {
      let value = String(line || "").trim();
      value = value.replace(/^#{1,6}\s+/, "").trim();
      value = value.replace(/^\*\*(.+?)\*\*$/, "$1").trim();
      value = value.replace(/\s+/g, " ");
      return value;
    }

    function isMarkdownHeadingLine(line) {
      const value = String(line || "").trim();
      if (!value) {
        return false;
      }
      return /^#{1,6}\s+\S/.test(value) || /^\*\*[^*].+[^*]\*\*$/.test(value);
    }

    const markdownCodeLanguages = new Set([
      "bat", "c", "c++", "cpp", "cs", "csharp", "css", "html", "ini", "java",
      "javascript", "js", "json", "md", "markdown", "powershell", "ps1",
      "py", "python", "qml", "sql", "text", "ts", "typescript", "xml",
      "yaml", "yml"
    ]);

    function markdownCodeLanguageLabel(language) {
      const normalized = String(language || "").trim().toLowerCase();
      const labels = {
        "c++": "C++",
        "cpp": "C++",
        "cs": "C#",
        "csharp": "C#",
        "javascript": "JavaScript",
        "js": "JavaScript",
        "powershell": "PowerShell",
        "ps1": "PowerShell",
        "py": "Python",
        "python": "Python",
        "ts": "TypeScript",
        "typescript": "TypeScript",
        "yaml": "YAML",
        "yml": "YAML"
      };
      return labels[normalized] || language;
    }

    function extractMarkdownCodeFence(raw) {
      let value = String(raw || "").replace(/^\s*\n/, "").replace(/\s+$/, "");
      let language = "";
      const firstToken = value.match(/^([A-Za-z0-9_+#.-]+)(?:[ \t]*\n|[ \t]+)([\s\S]*)$/);
      if (firstToken && markdownCodeLanguages.has(firstToken[1].toLowerCase())) {
        language = firstToken[1];
        value = firstToken[2];
      }
      return {
        language,
        code: value.replace(/^\n/, "").replace(/\s+$/, "")
      };
    }

    function appendInlineMarkdown(parent, text) {
      const source = String(text || "");
      const pattern = /`([^`]+)`|\*\*(.+?)\*\*/g;
      let index = 0;
      let match = pattern.exec(source);
      while (match) {
        if (match.index > index) {
          parent.appendChild(document.createTextNode(source.slice(index, match.index)));
        }
        if (match[1] !== undefined) {
          const code = document.createElement("code");
          code.className = "message-inline-code";
          code.textContent = match[1];
          parent.appendChild(code);
        } else {
          const strong = document.createElement("strong");
          strong.textContent = normalizeMarkdownHeading(match[2]);
          parent.appendChild(strong);
        }
        index = match.index + match[0].length;
        match = pattern.exec(source);
      }
      if (index < source.length) {
        parent.appendChild(document.createTextNode(source.slice(index)));
      }
    }

    function createMarkdownParagraph(lines) {
      const paragraph = document.createElement("p");
      appendInlineMarkdown(paragraph, lines.join("\n").trim());
      return paragraph;
    }

    function createMarkdownCodeBlock(codeText, language) {
      const wrapper = document.createElement("div");
      wrapper.className = "message-code-wrap";

      const languageLabel = markdownCodeLanguageLabel(language);
      if (languageLabel) {
        const label = document.createElement("div");
        label.className = "message-code-lang";
        label.textContent = languageLabel;
        wrapper.appendChild(label);
      }

      const pre = document.createElement("pre");
      pre.className = "message-code";
      const code = document.createElement("code");
      code.textContent = codeText || "";
      pre.appendChild(code);
      wrapper.appendChild(pre);
      return wrapper;
    }

    function createMarkdownHeading(line) {
      const heading = document.createElement("div");
      heading.className = "message-heading";
      heading.textContent = normalizeMarkdownHeading(line);
      return heading;
    }

    function createMarkdownTable(lines) {
      const headerCells = splitMarkdownTableRow(lines[0]) || [];
      const bodyLines = lines.slice(2);
      const wrapper = document.createElement("div");
      wrapper.className = "message-table-wrap";

      const table = document.createElement("table");
      table.className = "message-table";

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      headerCells.forEach((cell) => {
        const th = document.createElement("th");
        appendInlineMarkdown(th, cell);
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      bodyLines.forEach((line) => {
        const cells = splitMarkdownTableRow(line);
        if (!cells || !cells.length) {
          return;
        }
        const row = document.createElement("tr");
        for (let index = 0; index < headerCells.length; index += 1) {
          const td = document.createElement("td");
          appendInlineMarkdown(td, cells[index] || "");
          row.appendChild(td);
        }
        tbody.appendChild(row);
      });
      table.appendChild(tbody);
      wrapper.appendChild(table);
      return wrapper;
    }

    function orderedListMatch(line) {
      return String(line || "").match(/^\s*(\d+)[.)]\s+(.+)$/);
    }

    function normalizeInlineOrderedListBreaks(text) {
      return String(text || "").replace(/([^\n])\s+(\d{1,2})[.)]\s+(?=\S)/g, "$1\n$2. ");
    }

    function unorderedListMatch(line) {
      return String(line || "").match(/^\s*[-*]\s+(.+)$/);
    }

    function normalizeInlineUnorderedListBreaks(text) {
      return String(text || "")
        .split("\n")
        .map((line) => {
          if (/^\s*[-*]\s+/.test(line)) {
            return line;
          }

          const match = line.match(/^([\s\S]*?[.!?:])\s+-\s+([\s\S]+)$/);
          if (!match) {
            return line;
          }

          const prefix = match[1].trim();
          const items = match[2]
            .split(/\s+-\s+(?=[A-ZÄÖÜ0-9"„'`*])/)
            .map((item) => item.trim())
            .filter(Boolean);

          if (!items.length) {
            return line;
          }

          return [prefix, ...items.map((item) => `- ${item}`)].join("\n");
        })
        .join("\n");
    }

    function createMarkdownOrderedList(items, startNumber) {
      const list = document.createElement("ol");
      list.className = "message-list message-ordered-list";
      if (startNumber && startNumber !== 1) {
        list.start = startNumber;
      }
      items.forEach((itemLines) => {
        const item = document.createElement("li");
        appendInlineMarkdown(item, itemLines.join("\n").trim());
        list.appendChild(item);
      });
      return list;
    }

    function createMarkdownUnorderedList(items) {
      const list = document.createElement("ul");
      list.className = "message-list message-unordered-list";
      items.forEach((itemLines) => {
        const item = document.createElement("li");
        appendInlineMarkdown(item, itemLines.join("\n").trim());
        list.appendChild(item);
      });
      return list;
    }

    function renderMarkdownTextSegment(root, text) {
      const normalizedText = normalizeInlineUnorderedListBreaks(normalizeInlineOrderedListBreaks(text));
      const lines = normalizedText.replace(/\r\n/g, "\n").split("\n");
      let index = 0;
      let paragraph = [];

      const flushParagraph = () => {
        if (!paragraph.length) {
          return;
        }
        const nonEmpty = paragraph.filter((line) => line.trim());
        if (nonEmpty.length === 1 && isMarkdownHeadingLine(nonEmpty[0])) {
          root.appendChild(createMarkdownHeading(nonEmpty[0]));
        } else {
          root.appendChild(createMarkdownParagraph(paragraph));
        }
        paragraph = [];
      };

      while (index < lines.length) {
        const line = lines[index];
        const next = lines[index + 1];
        if (isMarkdownHeadingLine(line)) {
          flushParagraph();
          root.appendChild(createMarkdownHeading(line));
          index += 1;
          continue;
        }

        if (splitMarkdownTableRow(line) && isMarkdownTableSeparator(next || "")) {
          flushParagraph();
          const tableLines = [line, next];
          index += 2;
          while (index < lines.length && splitMarkdownTableRow(lines[index])) {
            tableLines.push(lines[index]);
            index += 1;
          }
          root.appendChild(createMarkdownTable(tableLines));
          continue;
        }

        const orderedMatch = orderedListMatch(line);
        if (orderedMatch) {
          flushParagraph();
          const startNumber = Number(orderedMatch[1] || "1");
          const items = [];
          while (index < lines.length) {
            const itemMatch = orderedListMatch(lines[index]);
            if (!itemMatch) {
              break;
            }
            const itemLines = [itemMatch[2]];
            index += 1;
            while (index < lines.length
              && lines[index].trim()
              && !isMarkdownHeadingLine(lines[index])
              && !orderedListMatch(lines[index])
              && !(splitMarkdownTableRow(lines[index]) && isMarkdownTableSeparator(lines[index + 1] || ""))) {
              itemLines.push(lines[index]);
              index += 1;
            }
            items.push(itemLines);
            if (index < lines.length && !lines[index].trim()) {
              index += 1;
              break;
            }
          }
          root.appendChild(createMarkdownOrderedList(items, startNumber));
          continue;
        }

        const unorderedMatch = unorderedListMatch(line);
        if (unorderedMatch) {
          flushParagraph();
          const items = [];
          while (index < lines.length) {
            const itemMatch = unorderedListMatch(lines[index]);
            if (!itemMatch) {
              break;
            }
            const itemLines = [itemMatch[1]];
            index += 1;
            while (index < lines.length
              && lines[index].trim()
              && !isMarkdownHeadingLine(lines[index])
              && !unorderedListMatch(lines[index])
              && !orderedListMatch(lines[index])
              && !(splitMarkdownTableRow(lines[index]) && isMarkdownTableSeparator(lines[index + 1] || ""))) {
              itemLines.push(lines[index]);
              index += 1;
            }
            items.push(itemLines);
            if (index < lines.length && !lines[index].trim()) {
              index += 1;
              break;
            }
          }
          root.appendChild(createMarkdownUnorderedList(items));
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          index += 1;
          continue;
        }

        paragraph.push(line);
        index += 1;
      }

      flushParagraph();
    }

    function renderMarkdownMessageText(text) {
      const root = document.createElement("div");
      root.className = "message-markdown";
      const source = String(text || "");
      const fencePattern = /```([\s\S]*?)```/g;
      let index = 0;
      let match = fencePattern.exec(source);
      while (match) {
        if (match.index > index) {
          renderMarkdownTextSegment(root, source.slice(index, match.index));
        }
        const fence = extractMarkdownCodeFence(match[1]);
        root.appendChild(createMarkdownCodeBlock(fence.code, fence.language));
        index = match.index + match[0].length;
        match = fencePattern.exec(source);
      }
      if (index < source.length) {
        renderMarkdownTextSegment(root, source.slice(index));
      }
      if (!root.childNodes.length) {
        root.textContent = text;
      }
      return root;
    }

    function typesetMath(element) {
      if (!element) {
        return;
      }
      if (window.MathJax && typeof window.MathJax.typesetPromise === "function") {
        window.MathJax.typesetPromise([element]).catch(() => {});
        return;
      }
      window.__bareboneQueuedMath = window.__bareboneQueuedMath || [];
      window.__bareboneQueuedMath.push(element);
    }

    window.__bareboneTypesetQueuedMath = function typesetQueuedMath() {
      const queued = window.__bareboneQueuedMath || [];
      window.__bareboneQueuedMath = [];
      if (!queued.length || !window.MathJax || typeof window.MathJax.typesetPromise !== "function") {
        return undefined;
      }
      return window.MathJax.typesetPromise(queued).catch(() => {});
    };

    function renderMessage(message) {
      const speaker = message.speaker;
      const text = message.message;
      const time = message.time;
      const role = roleForSpeaker(speaker);

      const article = document.createElement("article");
      article.className = "message " + role;

      if (role !== "user") {
        const avatar = document.createElement("div");
        avatar.className = "assistant-avatar";
        avatar.textContent = avatarForSpeaker(speaker);
        article.appendChild(avatar);
      }

      const content = document.createElement("div");
      content.className = "message-content";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = time ? `${speaker} - ${time}` : speaker;

      const body = renderMarkdownMessageText(text);

      if (role === "user") {
        bubble.appendChild(body);
      } else {
        bubble.appendChild(meta);
        bubble.appendChild(body);
      }

      content.appendChild(bubble);
      content.appendChild(createMessageFooter(text));
      article.appendChild(content);
      messages.appendChild(article);
      typesetMath(article);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTransientIndicator(indicator) {
      if (indicator && indicator.parentNode) {
        indicator.remove();
      }
    }

    function createStatusMessage({ speaker = "AI", text, state = "loading", details = false }) {
      const role = roleForSpeaker(speaker);
      const article = document.createElement("article");
      article.className = `message ${role} thinking-indicator`;
      article.setAttribute("aria-live", "polite");

      if (role !== "user") {
        const avatar = document.createElement("div");
        avatar.className = "assistant-avatar";
        avatar.textContent = avatarForSpeaker(speaker);
        article.appendChild(avatar);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const row = document.createElement("div");
      row.className = "thinking-row";

      const icon = document.createElement("span");
      if (state === "loading") {
        icon.className = "loading-spinner";
        icon.setAttribute("aria-hidden", "true");
      } else {
        icon.className = `status-mark ${state}`;
        icon.textContent = state === "done" ? "✓" : "!";
      }

      row.appendChild(icon);

      if (details && state === "loading") {
        const toggle = document.createElement("button");
        toggle.className = "thinking-toggle";
        toggle.type = "button";
        toggle.setAttribute("aria-expanded", "true");
        toggle.setAttribute("aria-label", "Denkschritte anzeigen");

        const label = document.createElement("span");

        const chevron = document.createElement("svg");
        chevron.className = "thinking-chevron";
        chevron.setAttribute("viewBox", "0 0 24 24");
        chevron.setAttribute("aria-hidden", "true");
        chevron.innerHTML = '<path d="m9 18 6-6-6-6" />';

        toggle.appendChild(label);
        toggle.appendChild(chevron);
        row.appendChild(toggle);

        const detailList = document.createElement("div");
        detailList.className = "thinking-details open";
        toggle.addEventListener("click", () => {
          const expanded = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!expanded));
          detailList.classList.toggle("open", !expanded);
        });

        bubble.appendChild(row);
        bubble.appendChild(detailList);
        thinkingDetailsList = detailList;
        thinkingDetailCount = 0;
      } else {
        const label = document.createElement("span");
        label.textContent = text;
        row.appendChild(label);
        bubble.appendChild(row);
      }
      article.appendChild(bubble);
      messages.appendChild(article);
      messages.scrollTop = messages.scrollHeight;
      return article;

    function showThinkingIndicator() {
      if (!thinkingIndicator) {
        thinkingIndicator = createStatusMessage({ speaker: "AI", text: "Denkt nach", state: "loading", details: true });
      }
      messages.scrollTop = messages.scrollHeight;
    }

    function addThinkingDetail(text, options = {}) {
      if (!isBusy && !thinkingIndicator) {
        return;
      }
      const detail = germanizeText(text).trim();
      if (!detail) {
        return;
      }
      showThinkingIndicator();
      if (!thinkingDetailsList) {
        return;
      }
      if (options.key) {
        const existing = Array.from(thinkingDetailsList.children)
          .find((child) => child.dataset && child.dataset.thinkingKey === options.key);
        if (existing) {
          existing.textContent = detail;
          messages.scrollTop = messages.scrollHeight;
          return;
        }
      }
      const item = document.createElement("div");
      item.className = "thinking-detail-item";
      if (options.key) {
        item.dataset.thinkingKey = options.key;
      }
      item.textContent = detail;
      thinkingDetailsList.appendChild(item);
      while (thinkingDetailsList.children.length > 10) {
        thinkingDetailsList.removeChild(thinkingDetailsList.firstElementChild);
      }
      thinkingDetailCount = thinkingDetailsList.children.length;
      messages.scrollTop = messages.scrollHeight;
    }

    function clearThinkingIndicator() {
      removeTransientIndicator(thinkingIndicator);
      thinkingIndicator = null;
      thinkingDetailsList = null;
      thinkingDetailCount = 0;
      batchThinkingState = { active: false, current: 0, total: 0 };
      aiThinkingState = { requests: 0, retries: 0, workflowRetries: 0 };
    }

    function completeThinkingIndicator({ collapseDetails = false } = {}) {
      if (!thinkingIndicator) {
        return;
      }
      if (thinkingDetailCount === 0) {
        clearThinkingIndicator();
        return;
      }

      const spinner = thinkingIndicator.querySelector(".loading-spinner");
      if (spinner) {
        spinner.className = "status-mark done";
        spinner.textContent = "✓";
        spinner.removeAttribute("aria-hidden");
      }

      const toggle = thinkingIndicator.querySelector(".thinking-toggle");
      if (toggle) {
        const label = toggle.querySelector("span");
        if (label) {
          label.textContent = "Gedacht";
        }
        toggle.setAttribute("aria-label", "Denkschritte anzeigen");
        toggle.setAttribute("aria-expanded", collapseDetails ? "false" : "true");
      }

      const details = thinkingIndicator.querySelector(".thinking-details");
      if (details && collapseDetails) {
        details.classList.remove("open");
      }

      thinkingIndicator.classList.remove("thinking-indicator");
      thinkingIndicator = null;
      thinkingDetailsList = null;
      thinkingDetailCount = 0;
      batchThinkingState = { active: false, current: 0, total: 0 };
      aiThinkingState = { requests: 0, retries: 0, workflowRetries: 0 };
    }

    function setCapabilitiesIndicator(state, text) {
      if (!capabilitiesIndicator || !capabilitiesIndicator.isConnected) {
        capabilitiesIndicator = createStatusMessage({ speaker: "Barebone-Qt", text, state });
        return;
      }

      const row = capabilitiesIndicator.querySelector(".thinking-row");
      if (!row) {
        return;
      }
      row.replaceChildren();

      const icon = document.createElement("span");
      if (state === "loading") {
        icon.className = "loading-spinner";
        icon.setAttribute("aria-hidden", "true");
      } else {
        icon.className = `status-mark ${state}`;
        icon.textContent = state === "done" ? "✓" : "!";
      }

      const label = document.createElement("span");
      label.textContent = text;
      row.appendChild(icon);
      row.appendChild(label);
      messages.scrollTop = messages.scrollHeight;
    }

    function shouldShowBrxCapabilitiesInChat() {
      return trainingMode || chatMode === "bricscad";
    }

    function clearCapabilitiesIndicator() {
      if (capabilitiesIndicator && capabilitiesIndicator.isConnected) {
        capabilitiesIndicator.remove();
      }
      capabilitiesIndicator = null;
    }

    function updateSessionTitle(session, message) {
      if (message.speaker !== "Du" || session.userNamed) {
        return;
      }
      const text = message.message.trim();
      if (!text) {
        return;
      }
      session.title = text.length > 42 ? `${text.slice(0, 42)}...` : text;
      session.userNamed = true;
    }

    function addMessage(message, options = {}) {
      const normalized = normalizeMessage(message);
      const collapseThinking = pendingExecutionSummary && normalized.speaker === "AI";
      completeThinkingIndicator({ collapseDetails: collapseThinking });
      if (collapseThinking) {
        pendingExecutionSummary = false;
      }
      const record = options.record !== false;
      const currentProposal = activeSession().proposal;
      if (record) {
        const session = activeSession();
        session.messages.push(normalized);
        updateSessionTitle(session, normalized);
        persistSessions();
        renderSessionList();
      }
      if (!currentProposal) {
        removeInlineProposal();
      }
      renderMessage(normalized);
      if (currentProposal && (!proposalInline || !proposalInline.isConnected)) {
        renderProposal(currentProposal);
      }
    }

    function setBusy(status) {
      isBusy = status === "thinking";
      agentStatus.textContent = isBusy ? "AI arbeitet" : "Leerlauf";
      agentStatus.classList.toggle("thinking", isBusy);
      input.disabled = isBusy;
      sendButton.disabled = isBusy || documentsLoading > 0;
      attachButton.disabled = isBusy;
      if (isBusy) {
        showThinkingIndicator();
      } else {
        requestAnimationFrame(() => input.focus());
      }
    }

    function renderProposal(proposal) {
      proposalPanel.classList.remove("visible");
      proposalDetails.textContent = "";
      removeInlineProposal();

      if (!proposal) {
        return;
      }

      completeThinkingIndicator();

      const article = document.createElement("article");
      article.className = "message system inline-proposal";

      const avatar = document.createElement("div");
      avatar.className = "assistant-avatar";
      avatar.textContent = "Qt";
      article.appendChild(avatar);

      const bubble = document.createElement("div");

      title.className = "inline-proposal-title";
      title.textContent = germanizeText(proposal.title || "AI Vorschlag bereit");

      if (summaryText) {

      const detailsText = germanizeText(proposal.details || "");
      if (detailsText) {

        toggleLabel.textContent = "Details anzeigen";

        chevron.className = "thinking-chevron";
        chevron.setAttribute("viewBox", "0 0 24 24");
        chevron.setAttribute("aria-hidden", "true");
        chevron.innerHTML = '<path d="m9 18 6-6-6-6" />';

        const details = document.createElement("div");
        details.className = "inline-proposal-details";
        details.textContent = detailsText;

        toggle.appendChild(toggleLabel);
        toggle.appendChild(chevron);
        toggle.addEventListener("click", () => {
          const expanded = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!expanded));
          toggleLabel.textContent = expanded ? "Details anzeigen" : "Details ausblenden";
          details.classList.toggle("open", !expanded);

      const actions = document.createElement("div");

      const cancel = document.createElement("button");
      cancel.className = "cancel-btn";
